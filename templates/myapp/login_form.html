{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login page</title>
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
</head>
<body>
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        <label>Username:</label>
        <input type="text" name="username" required><br>
        <label>Password:</label>
        <input type="password" name="password" required><br>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'Registration_form' %}">Register here</a></p><br><br>
    <p>See registered users <a href="{% url 'user_list' %}"> Registered Users</a></p><br><br>
    <p>Back to home <a href="{% url 'dashboard' %}">Dashboard</a></p>
</body>
</html>
